<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Hoor Studio — Ultra-luxury women's western fashion. New Season 2026.">
<title>HOOR STUDIO — Luxury Women's Fashion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;1,6..96,300;1,6..96,400&family=Jost:wght@200;300;400;500&family=Italiana&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════
   ORIGINAL HOOR STUDIO LUXURY STYLES
═══════════════════════════════════════════ */
:root {
  --ink:      #08080a;
  --ink-2:    #0f0f12;
  --ink-3:    #161619;
  --ink-4:    #1d1d22;
  --silver:   #a8a8b0;
  --silver-2: #c8c8d2;
  --silver-3: #e2e2ec;
  --platinum: #f5f5f7;
  --gold:     #c59b27;
  --gold-2:    #dfb743;
  --crimson:  #922;
  --f-serif:  'Italiana', serif;
  --f-display:'Bodoni Moda', serif;
  --f-sans:   'Jost', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: var(--ink);
  color: var(--platinum);
  font-family: var(--f-sans);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }

/* TOP BAR & TIMERS */
.tb {
  background: var(--ink-3); text-align: center; padding: 12px 20px;
  font-size: 11px; letter-spacing: 0.15em; font-weight: 300;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.tb-i { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
.cd { display: inline-flex; gap: 8px; font-weight: 400; color: var(--gold); }

/* HEADER */
header {
  padding: 30px 4%; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; background: rgba(8,8,10,0.95); z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.02); backdrop-filter: blur(10px);
}
.logo { font-family: var(--f-serif); font-size: 28px; letter-spacing: 0.2em; text-transform: uppercase; }
nav a { font-size: 13px; letter-spacing: 0.1em; margin-left: 25px; text-transform: uppercase; font-weight: 300; transition: color 0.3s; }
nav a:hover { color: var(--gold); }

/* HERO CONTAINER */
.hero { padding: 120px 4% 80px 4%; text-align: center; background: radial-gradient(circle at center, #161619 0%, #08080a 100%); }
.hero h1 { font-family: var(--f-serif); font-size: 52px; letter-spacing: 0.15em; margin-bottom: 20px; font-weight: 400; }
.hero p { font-size: 15px; color: var(--silver); max-width: 600px; margin: 0 auto 30px auto; font-weight: 300; line-height: 1.8; }

/* ANIMATION CLASSES */
.sr { opacity: 0; transform: translateY(20px); transition: all 0.8s ease; }
.sr.v { opacity: 1; transform: translateY(0); }

/* PRODUCTS GRID CONTROLLER */
.main-container { padding: 60px 4%; max-width: 1400px; margin: 0 auto; }
.grid-title { font-family: var(--f-serif); font-size: 36px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 50px; text-align: center; color: var(--gold); }

#products-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px;
}

/* LUXURY 3D INTERACTIVE CARD */
.product-card {
  background: var(--ink-2); border: 1px solid rgba(255,255,255,0.02);
  padding: 18px; display: flex; flex-direction: column;
  transition: box-shadow 0.3s, border-color 0.3s;
  transform-style: preserve-3d; perspective: 1000px;
}
.product-card:hover { border-color: rgba(197,155,39,0.25); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

.img-box { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; background: #121215; }
.img-box img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; }

/* BADGES */
.badge {
  position: absolute; top: 15px; left: 15px; background: var(--gold); color: var(--ink);
  font-size: 10px; font-weight: 500; padding: 4px 10px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 2;
}
.badge.sale { background: var(--crimson); color: var(--platinum); }

/* MULTIPLE IMAGES GALLERIES */
.thumbnails-container { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 4px; }
.thumbnails-container::-webkit-scrollbar { height: 3px; }
.thumbnails-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
.thumb-img { width: 45px; height: 60px; object-fit: cover; cursor: pointer; border: 1px solid transparent; opacity: 0.5; transition: all 0.2s; }
.thumb-img.active, .thumb-img:hover { opacity: 1; border-color: var(--gold); }

/* DETAILS */
.card-meta { margin-top: 20px; display: flex; flex-direction: column; flex-grow: 1; }
.c-title { font-family: var(--f-display); font-size: 21px; letter-spacing: 0.05em; font-weight: 400; margin-bottom: 6px; text-transform: uppercase; color: var(--platinum); }
.c-desc { font-size: 13px; color: var(--silver); line-height: 1.6; font-weight: 300; margin-bottom: 20px; flex-grow: 1; }
.c-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 15px; }

.price { display: flex; flex-direction: column; gap: 2px; }
.price span { font-size: 18px; color: var(--gold); font-weight: 400; letter-spacing: 0.05em; }
.price .old-price { font-size: 13px; color: var(--silver); text-decoration: line-through; opacity: 0.6; }

/* WHATSAPP ACTION BUTTON */
.wa-btn {
  background: transparent; color: var(--platinum); border: 1px solid rgba(255,255,255,0.15);
  padding: 10px 20px; text-align: center; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  font-weight: 400; transition: all 0.3s; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
}
.wa-btn:hover { background: var(--platinum); color: var(--ink); border-color: var(--platinum); }

/* LIVE LOADER STATUS */
#loading-status { grid-column: 1 / -1; text-align: center; padding: 80px 0; font-size: 14px; letter-spacing: 0.15em; color: var(--silver); font-weight: 300; text-transform: uppercase; }
</style>
</head>
<body>

<div class="tb">
  <div class="tb-i">
    <span>CONCOURS D'ÉLÉGANCE • NEW COLLECTION DROP</span>
    <div class="cd">
        <span id="cdD">00</span>d : <span id="cdH">00</span>h : <span id="cdM">00</span>m : <span id="cdS">00</span>s
    </div>
  </div>
</div>

<header>
  <div class="logo">Hoor Studio</div>
  <nav>
    <a href="#collections">Collections</a>
    <a href="/admin/">Dashboard</a>
  </nav>
</header>

<section class="hero">
  <div class="sr">
    <h1>THE NEW ERA OF LUXURY</h1>
    <p>Crafted for the modern woman who demands perfection. Discover curated luxury pret and haute couture tailored uniquely for you.</p>
  </div>
</section>

<div class="main-container" id="collections">
  <h2 class="grid-title">Our Collection</h2>
  <div id="products-grid">
    <div id="loading-status"><i class="fa-solid fa-spinner fa-spin"></i> Fetching Live Catalog...</div>
  </div>
</div>

<script>
    // IMAGE SWITCHING LOGIC FOR THUMBNAILS
    window.switchMainImage = function(pId, newSrc, thumbElement) {
        const mainImg = document.getElementById(pId);
        if (mainImg) {
            mainImg.style.opacity = '0.3';
            setTimeout(() => {
                mainImg.src = newSrc;
                mainImg.style.opacity = '1';
            }, 150);
        }
        const parent = thumbElement.parentElement;
        parent.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
        thumbElement.classList.add('active');
    };

    // 3D PARALLAX EFFECT FOR LUXURY CARDS
    function apply3DEffect(card) {
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left - (rect.width / 2);
            const y = e.clientY - rect.top - (rect.height / 2);
            card.style.transform = `perspective(1000px) rotateX(${-y / 20}deg) rotateY(${x / 20}deg) translateY(-5px)`;
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0deg)';
        });
    }

    // PARSE MARKDOWN FRONTMATTER
    function parseMarkdown(text) {
        try {
            const parts = text.split('---');
            if (parts.length < 3) return null;
            const yamlSection = parts[1];
            const body = parts.slice(2).join('---').trim();

            const titleMatch = yamlSection.match(/title:\s*"(.*?)"/) || yamlSection.match(/title:\s*(.*)/);
            const priceMatch = yamlSection.match(/price:\s*"(.*?)"/) || yamlSection.match(/price:\s*(.*)/);
            const oldPriceMatch = yamlSection.match(/old_price:\s*"(.*?)"/) || yamlSection.match(/old_price:\s*(.*)/);
            const badgeMatch = yamlSection.match(/badge:\s*"(.*?)"/) || yamlSection.match(/badge:\s*(.*)/);
            const badgeStyleMatch = yamlSection.match(/badge_style:\s*"(.*?)"/) || yamlSection.match(/badge_style:\s*(.*)/);
            
            // Array image compiler
            const images = [];
            const lines = yamlSection.split('\n');
            let inImagesList = false;

            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('images:')) {
                    inImagesList = true;
                    continue;
                }
                if (inImagesList) {
                    if (trimmed.startsWith('-') || trimmed.startsWith('image:')) {
                        const imgUrl = trimmed.replace(/^-\s*["']?/, '').replace(/["']?$/, '').replace(/^image:\s*["']?/, '');
                        if (imgUrl) images.push(imgUrl.trim());
                    } else if (trimmed !== '' && !line.startsWith(' ')) {
                        inImagesList = false;
                    }
                }
            }

            // Fallback to single 'image' if no image gallery array is detected
            if (images.length === 0) {
                const singleImgMatch = yamlSection.match(/image:\s*"(.*?)"/) || yamlSection.match(/image:\s*(.*)/);
                if (singleImgMatch) images.push(singleImgMatch[1].trim());
            }

            return {
                title: titleMatch ? titleMatch[1].replace(/"/g, '') : 'Luxury Attire',
                price: priceMatch ? priceMatch[1].replace(/"/g, '') : 'On Request',
                old_price: oldPriceMatch ? oldPriceMatch[1].replace(/"/g, '') : null,
                badge: badgeMatch ? badgeMatch[1].replace(/"/g, '') : null,
                badge_style: badgeStyleMatch ? badgeStyleMatch[1].replace(/"/g, '') : 'default',
                images: images.length > 0 ? images : ['/images/uploads/placeholder.jpg'],
                description: body || 'Premium custom design exclusively crafted by Hoor Studio.'
            };
        } catch (e) {
            console.error("Parser failure:", e);
            return null;
        }
    }

    // REPOSITORY ENGINE INTERACTOR
    async function loadProducts() {
        const grid = document.getElementById('products-grid');
        if (!grid) return;

        try {
            // Live production fetch point mapped to repository architecture
            const response = await fetch('https://api.github.com/repos/hoorstudio/Hoorstudio/contents/products');
            
            if (!response.ok) {
                grid.innerHTML = `<div id="loading-status">NO PRODUCTS FOUND. VISIT THE CMS DASHBOARD TO ADD CATALOG PIECES.</div>`;
                return;
            }

            const files = await response.json();
            const mdFiles = files.filter(f => f.name.endsWith('.md'));

            if (mdFiles.length === 0) {
                grid.innerHTML = `<div id="loading-status">NO PRODUCTS AVAILABLE IN THE REPOSITORY.</div>`;
                return;
            }

            grid.innerHTML = ''; // Clear loading spinner

            for (const file of mdFiles) {
                try {
                    const fileRes = await fetch(file.download_url);
                    const text = await fileRes.text();
                    const product = parseMarkdown(text);

                    if (!product) continue;

                    const card = document.createElement('div');
                    card.className = 'product-card sr';
                    const pId = 'img-' + Math.random().toString(36).substr(2, 9);

                    // Dynamic thumbs builder
                    let thumbsHtml = '';
                    if (product.images.length > 1) {
                        thumbsHtml = `<div class="thumbnails-container">`;
                        product.images.forEach((img, index) => {
                            thumbsHtml += `<img src="${img}" class="thumb-img ${index === 0 ? 'active' : ''}" onclick="switchMainImage('${pId}', '${img}', this)" alt="thumbnail">`;
                        });
                        thumbsHtml += `</div>`;
                    }

                    // Automated Messaging Link Mapped to Your Custom WhatsApp Business Number
                    const waNumber = "923059218013"; 
                    const waMessage = encodeURIComponent(`Salam Hoor Studio, I am interested in purchasing:\n\nProduct: ${product.title}\nPrice: Rs. ${product.price}\nLink: ${window.location.origin}/#collections`);
                    const waUrl = `https://wa.me/${waNumber}?text=${waMessage}`;

                    card.innerHTML = `
                        <div class="img-box">
                            ${product.badge ? `<span class="badge ${product.badge_style === 'sale' ? 'sale' : ''}">${product.badge}</span>` : ''}
                            <img id="${pId}" src="${product.images[0]}" alt="${product.title}">
                        </div>
                        ${thumbsHtml}
                        <div class="card-meta">
                            <div>
                                <h3 class="c-title">${product.title}</h3>
                                <p class="c-desc">${product.description}</p>
                            </div>
                            <div class="c-row">
                                <div class="price">
                                    <span>Rs. ${product.price}</span>
                                    ${product.old_price ? `<span class="old-price">Rs. ${product.old_price}</span>` : ''}
                                </div>
                                <a href="${waUrl}" target="_blank" class="wa-btn">
                                    <i class="fa-brands fa-whatsapp text-sm"></i> Order
                                </a>
                            </div>
                        </div>
                    `;
                    
                    apply3DEffect(card);
                    grid.appendChild(card);
                } catch (e) { 
                    console.error("Individual card error:", e); 
                }
            }

            // Scroll trigger reveal animations controller
            const srEls = document.querySelectorAll('.sr');
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.add('v');
                        obs.unobserve(e.target);
                    }
                });
            }, { threshold: 0.05 });
            srEls.forEach(el => obs.observe(el));

        } catch (error) {
            console.error("Global grid engine issue:", error);
            grid.innerHTML = `<div id="loading-status" style="color:var(--crimson);">ERROR LOADING COLLECTION. PLEASE REFRESH.</div>`;
        }
    }

    // FIXED STATIC TIMED COUNTDOWN
    const endTime = Date.now() + (2*86400+14*3600+37*60+44)*1000;
    function tick(){
        const diff = Math.max(0,Math.floor((endTime-Date.now())/1000));
        const cdD = document.getElementById('cdD');
        const cdH = document.getElementById('cdH');
        const cdM = document.getElementById('cdM');
        const cdS = document.getElementById('cdS');
        
        if(cdD && cdH && cdM && cdS) {
            cdD.textContent=String(Math.floor(diff/86400)).padStart(2,'0');
            cdH.textContent=String(Math.floor(diff%86400/3600)).padStart(2,'0');
            cdM.textContent=String(Math.floor(diff%3600/60)).padStart(2,'0');
            cdS.textContent=String(diff%60).padStart(2,'0');
        }
    }
    setInterval(tick,1000);

    window.addEventListener('DOMContentLoaded', () => {
        loadProducts();
        tick();
        setTimeout(() => { 
            const heroSr = document.querySelector('.hero .sr');
            if(heroSr) heroSr.classList.add('v'); 
        }, 200);
    });
</script>
</body>
</html>
