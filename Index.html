<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoor Studio Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FAF9F6] text-[#2C2C2C]">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-[#EAE6DF]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0">
                    <span class="serif text-2xl font-bold tracking-widest text-[#1A1A1A]">HOOR STUDIO</span>
                </div>
                <div class="hidden md:flex space-x-8 text-sm font-medium tracking-wider text-[#555555]">
                    <a href="#" class="hover:text-[#D4AF37] transition-colors">HOME</a>
                    <a href="#products" class="hover:text-[#D4AF37] transition-colors">COLLECTIONS</a>
                    <a href="#" class="hover:text-[#D4AF37] transition-colors">ABOUT</a>
                    <a href="#" class="hover:text-[#D4AF37] transition-colors">CONTACT</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="#" class="text-[#2C2C2C] hover:text-[#D4AF37] transition-colors relative">
                        <i class="fa-solid fa-bag-shopping text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative bg-[#EAE6DF] h-[60vh] flex items-center overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full">
            <div class="max-w-md">
                <span class="text-xs font-bold tracking-widest text-[#D4AF37] block mb-2">NEW COLLECTION</span>
                <h1 class="serif text-4xl sm:text-5xl font-light tracking-wide text-[#1A1A1A] leading-tight mb-4">Elegance In Every Thread</h1>
                <p class="text-sm text-[#555555] mb-6 font-light">Discover premium fabrics and timeless designs crafted for the modern woman.</p>
                <a href="#products" class="inline-block bg-[#1A1A1A] text-white text-xs tracking-widest px-8 py-3.5 hover:bg-[#D4AF37] transition-colors duration-300">SHOP NOW</a>
            </div>
        </div>
    </header>

    <section id="products" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="text-center mb-12">
            <h2 class="serif text-3xl font-light tracking-wide text-[#1A1A1A]">Our Masterpieces</h2>
            <div class="h-[1px] w-12 bg-[#D4AF37] mx-auto mt-3"></div>
        </div>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div id="loading-status" class="col-span-full text-center py-12 text-[#555555] font-light tracking-wider">
                <i class="fa-solid fa-spinner fa-spin text-2xl text-[#D4AF37] mb-2 block"></i>
                Loading luxury collection...
            </div>
        </div>
    </section>

    <footer class="bg-[#1A1A1A] text-white py-12 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs tracking-widest text-gray-400">
            <p>&copy; 2026 HOOR STUDIO. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script>
        // Simple YAML/FrontMatter parser function
        function parseFrontMatter(text) {
            const lines = text.split('\n');
            const data = { images: [] };
            let isYaml = false;
            let currentKey = null;
            let bodyLines = [];

            for (let line of lines) {
                if (line.trim() === '---') {
                    isYaml = !isYaml;
                    continue;
                }
                if (isYaml) {
                    // Check for list items under images
                    if (line.trim().startsWith('-') && currentKey === 'images') {
                        const imgUrl = line.replace(/['-]/g, '').trim();
                        if (imgUrl) data.images.push(imgUrl);
                        continue;
                    }
                    
                    const splitIdx = line.indexOf(':');
                    if (splitIdx !== -1) {
                        const key = line.slice(0, splitIdx).trim();
                        let value = line.slice(splitIdx + 1).trim().replace(/^["']|["']$/g, '');
                        currentKey = key;
                        
                        if (key !== 'images') {
                            data[key] = value;
                        }
                    }
                } else {
                    bodyLines.push(line);
                }
            }
            data.description = bodyLines.join('\n').trim() || data.description || '';
            return data;
        }

        // Main function to load products from /products/ folder
        async function loadProducts() {
            const grid = document.getElementById('products-grid');
            const status = document.getElementById('loading-status');

            try {
                // Fetch the automatically generated repository directory list via Netlify
                const response = await fetch('/products/');
                if (!response.ok) throw new Error('Could not read products directory');
                
                const htmlText = await response.text();
                
                // Extract all .md file links from the directory page
                const doc = new DOMParser().parseFromString(htmlText, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'))
                                   .map(a => a.getAttribute('href'))
                                   .filter(href => href && href.endsWith('.md'));

                if (links.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-12 text-[#555555] font-light">No products uploaded yet. Check back soon!</div>`;
                    return;
                }

                // Remove loading message
                if (status) status.remove();

                // Loop and fetch data inside each markdown file
                for (let fileUrl of links) {
                    try {
                        const fileRes = await fetch(fileUrl);
                        if (!fileRes.ok) continue;
                        
                        const mdContent = await fileRes.text();
                        const product = parseFrontMatter(mdContent);

                        // Fallback image if array is empty
                        if (product.images.length === 0 && product.image) {
                            product.images.push(product.image);
                        }
                        if (product.images.length === 0) {
                            product.images.push('https://via.placeholder.com/400x500?text=No+Image');
                        }

                        // Create unique ID for image switcher
                        const pId = 'prod-' + Math.random().toString(36).substr(2, 9);

                        // Generate Dynamic Card HTML matching your theme
                        const card = document.createElement('div');
                        card.className = "group bg-white border border-[#EAE6DF] overflow-hidden flex flex-col justify-between transition-all duration-300 hover:shadow-md";
                        
                        // Generate Thumbnails HTML if there are multiple images
                        let thumbnailsHtml = '';
                        if (product.images.length > 1) {
                            thumbnailsHtml = `<div class="flex space-x-1.5 mt-2 overflow-x-auto px-4 pb-2">`;
                            product.images.forEach((img, index) => {
                                thumbnailsHtml += `
                                    <img src="${img}" 
                                         onclick="document.getElementById('${pId}').src='${img}'" 
                                         class="w-10 h-12 object-cover border border-[#EAE6DF] cursor-pointer hover:border-[#D4AF37] transition-all" 
                                         alt="thumb">`;
                            });
                            thumbnailsHtml += `</div>`;
                        }

                        card.innerHTML = `
                            <div class="relative overflow-hidden aspect-[4/5] bg-[#F7F7F7]">
                                ${product.badge ? `<span class="absolute top-4 left-4 z-10 text-[10px] tracking-widest uppercase font-bold px-2.5 py-1 ${product.badge_style === 'sale' ? 'bg-[#982B2B] text-white' : 'bg-[#D4AF37] text-white'}">${product.badge}</span>` : ''}
                                <img id="${pId}" src="${product.images[0]}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="${product.title}">
                            </div>
                            ${thumbnailsHtml}
                            <div class="p-5 flex-grow flex flex-col justify-between">
                                <div>
                                    <span class="text-[10px] tracking-widest text-[#D4AF37] uppercase font-semibold block mb-1">${product.category || 'Collection'}</span>
                                    <h3 class="serif text-lg text-[#1A1A1A] font-light tracking-wide mb-2">${product.title}</h3>
                                    <p class="text-xs text-[#777777] font-light line-clamp-2 mb-4">${product.description}</p>
                                </div>
                                <div class="flex items-center justify-between pt-2 border-t border-[#F4F1EA]">
                                    <div class="flex items-baseline space-x-2">
                                        <span class="text-sm font-medium text-[#1A1A1A]">${product.price}</span>
                                        ${product.old_price ? `<span class="text-xs text-gray-400 line-through font-light">${product.old_price}</span>` : ''}
                                    </div>
                                    <button class="text-xs tracking-widest text-[#1A1A1A] hover:text-[#D4AF37] font-medium transition-colors uppercase">
                                        <i class="fa-solid fa-plus mr-1 text-[10px]"></i> View
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    } catch (e) {
                        console.error("Error reading individual product file:", e);
                    }
                }
            } catch (error) {
                console.error("Error loading luxury products collection:", error);
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-[#982B2B] font-light">Failed to load the collection. Please refresh the page.</div>`;
            }
        }

        // Initialize script on load
        window.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
